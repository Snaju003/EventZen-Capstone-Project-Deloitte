spring:
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${MONGO_DATABASE}
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:kafka:9092}

server:
  port: ${SERVER_PORT}

logging:
  level:
    com.eventzen: ${LOG_LEVEL:INFO}

groq:
  api-key: ${GROQ_API_KEY}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

booking-service:
  url: ${BOOKING_SERVICE_URL:http://booking-service:5000}
