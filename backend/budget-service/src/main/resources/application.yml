spring:
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${MONGO_DATABASE}

server:
  port: ${SERVER_PORT:8081}

event-service:
  base-url: ${EVENT_SERVICE_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
